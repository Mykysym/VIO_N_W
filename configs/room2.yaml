# Room2 sequence — full ground truth available
seq_name: room2
dataset_root: data/room2
cam: cam0
seed: 0

vo:
  detector: ORB
  n_features: 1000
  min_matches: 30
  ransac_threshold: 1.0
  window_size: 15 # keyframes in local BA

vio:
  window_size: 5
  gravity: [0.0, 9.81, 0.0]
  min_init_frames: 30
  max_init_frames: 300
  kf_parallax_thresh: 30.0
  kf_min_tracks: 80
  kf_max_interval: 5
  imu_weight: 0.007

eval:
  align: sim3 # VO uses Sim(3), VIO uses SE(3)
  rpe_segment_len: 100 # metres
  rpe_rot_threshold: 60 # degrees
