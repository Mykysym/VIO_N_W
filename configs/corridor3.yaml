# Corridor3 sequence — partial ground truth (start/end only)
seq_name: corridor3
dataset_root: data/corridor3
cam: cam0
seed: 0

vo:
  detector: ORB
  n_features: 1000
  min_matches: 30
  ransac_threshold: 1.0
  window_size: 10

vio:
  window_size: 10
  gravity: [0.0, 9.81, 0.0]
  min_init_frames: 30
  max_init_frames: 300
  kf_parallax_thresh: 30.0
  kf_min_tracks: 80
  kf_max_interval: 5
  imu_weight: 0.009

eval:
  align: se3 # VO uses Sim(3), VIO uses SE(3)
  rpe_segment_len: 100 # metres
  rpe_rot_threshold: 60 # degrees
